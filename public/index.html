<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#2563eb" />
    <meta name="description" content="Bird My Trip - Find your perfect stay" />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />

    <!-- ✅ PREMIUM FONTS -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400&family=Inter:wght@300;400;500;600;700&family=Manrope:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />

    <!-- ✅ GOOGLE TRANSLATE INIT -->
    <script type="text/javascript">
      function googleTranslateElementInit() {
        new google.translate.TranslateElement(
          {
            pageLanguage: "en",
            includedLanguages:
              "hi,ar,zh-TW,zh-CN,da,nl,fi,fr,de,el,id,it,ja,ko,ms,pl,pt,ru,es,sv,th,tr,uk,vi",
            layout: google.translate.TranslateElement.InlineLayout.SIMPLE,
            autoDisplay: false,
            multilanguagePage: true,
          },
          "google_translate_element"
        );
      }

      // ── On page load: apply saved language from localStorage ──
      (function applySavedLanguage() {
        try {
          var saved = localStorage.getItem("bmt_lang");
          if (!saved) return;
          var lang = JSON.parse(saved);
          if (!lang || !lang.code) return;

          // Check if cookie already set for this language
          var cookieValue = "/en/" + lang.code;
          var cookies = document.cookie;
          if (cookies.indexOf("googtrans=" + cookieValue) === -1) {
            // Cookie not set — set it so GT picks it up on load
            var hostname = window.location.hostname;
            document.cookie = "googtrans=" + cookieValue + "; path=/";
            document.cookie = "googtrans=" + cookieValue + "; path=/; domain=" + hostname;
            document.cookie = "googtrans=" + cookieValue + "; path=/; domain=." + hostname;
          }
        } catch (e) {
          // Silently fail
        }
      })();
    </script>

    <!-- ✅ GOOGLE TRANSLATE SCRIPT -->
    <script
      type="text/javascript"
      src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"
    ></script>

    <!-- ✅ GOOGLE TRANSLATE STYLE CLEANUP -->
    <style>
      /* Remove Google's floating top bar */
      .goog-te-banner-frame.skiptranslate,
      .goog-te-banner-frame {
        display: none !important;
      }
      /* Prevent body shift when GT banner would show */
      body {
        top: 0px !important;
        position: relative !important;
      }
      /* Hide the element GT renders (we use our own UI) */
      /* #google_translate_element {
        display: none !important;
      } */
       #google_translate_element {
  position: fixed;
  bottom: 0;
  left: 0;
  opacity: 0;
  pointer-events: none;
}
      /* Remove GT branding from translated pages */
      .goog-logo-link,
      .goog-te-gadget span {
        display: none !important;
      }
      .goog-te-gadget {
        color: transparent !important;
        font-size: 0 !important;
      }
      /* GT dropdown menu styling */
      .goog-te-menu-frame {
        border-radius: 16px !important;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.14) !important;
        border: 1px solid #e5e7eb !important;
        overflow: hidden !important;
      }
      .goog-te-menu2-item div,
      .goog-te-menu2-item:link div,
      .goog-te-menu2-item:visited div,
      .goog-te-menu2-item:active div {
        font-family: "Plus Jakarta Sans", sans-serif !important;
        font-size: 13px !important;
        padding: 8px 16px !important;
      }
      .goog-te-menu2-item:hover div {
        background-color: #eff6ff !important;
        color: #2563eb !important;
      }

      /* Global font override */
      * {
        font-family: "Plus Jakarta Sans", "Inter", sans-serif;
      }
    </style>

    <title>Bird My Trip</title>
  </head>
